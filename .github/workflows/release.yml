name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      skip: ${{ steps.tag.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG="v${VERSION}"
          echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save version
        if: steps.tag.outputs.skip != 'true'
        run: echo "${{ steps.tag.outputs.new_tag }}" > version.txt

      - uses: actions/upload-artifact@v4
        if: steps.tag.outputs.skip != 'true'
        with:
          name: release-version
          path: version.txt

  build:
    name: Build ${{ matrix.target }}
    needs: tag
    if: needs.tag.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install musl tools (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build
        run: |
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf gitreg-${{ matrix.target }}.tar.gz gitreg
          mv gitreg-${{ matrix.target }}.tar.gz ../../../
          cd ../../..
          sha256sum gitreg-${{ matrix.target }}.tar.gz \
            > gitreg-${{ matrix.target }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target\${{ matrix.target }}\release\gitreg.exe" `
            -DestinationPath "gitreg-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "gitreg-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  gitreg-${{ matrix.target }}.zip" `
            | Out-File -Encoding utf8 "gitreg-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitreg-${{ matrix.target }}
          path: |
            gitreg-${{ matrix.target }}.${{ matrix.archive }}
            gitreg-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish:
    name: Publish release
    needs: [tag, build]
    if: needs.tag.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          prerelease: true
          makeLatest: false
          allowUpdates: true
          removeArtifacts: true
          artifacts: "dist/**"
