name: Release

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.compute.outputs.new_tag }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5        # v4.3.1
        with:
          fetch-depth: 0

      - name: Compute next version
        id: compute
        run: |
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEW_VERSION="$CARGO_VERSION"
          else
            LATEST_VER="${LATEST#v}"
            IFS='.' read -r MAJ MIN PAT <<< "$LATEST_VER"
            IFS='.' read -r C_MAJ C_MIN C_PAT <<< "$CARGO_VERSION"
            if [ "$C_MAJ" -gt "$MAJ" ] \
               || { [ "$C_MAJ" -eq "$MAJ" ] && [ "$C_MIN" -gt "$MIN" ]; } \
               || { [ "$C_MAJ" -eq "$MAJ" ] && [ "$C_MIN" -eq "$MIN" ] && [ "$C_PAT" -gt "$PAT" ]; }; then
              NEW_VERSION="$CARGO_VERSION"
            else
              NEW_VERSION="${MAJ}.${MIN}.$((PAT + 1))"
            fi
          fi

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        run: |
          NEW_VERSION="${{ steps.compute.outputs.new_version }}"
          sed -i "s/^version = \"[^\"]*\"/version = \"${NEW_VERSION}\"/" Cargo.toml

      - name: Update Cargo.lock
        run: |
          awk -v v="${{ steps.compute.outputs.new_version }}" '
            /^name = "gitreg"$/ { found=1 }
            found && /^version = / { sub(/"[^"]*"/, "\"" v "\""); found=0 }
            { print }
          ' Cargo.lock > Cargo.lock.tmp && mv Cargo.lock.tmp Cargo.lock

      - name: Commit and tag
        id: push
        run: |
          NEW_TAG="${{ steps.compute.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${NEW_TAG}"
          git tag "${NEW_TAG}"
          git push origin HEAD:main
          git push origin "${NEW_TAG}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5        # v4.3.1
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8   # stable 2026-05-01
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32       # v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install musl tools (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build
        run: |
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf gitreg-${{ matrix.target }}.tar.gz gitreg
          mv gitreg-${{ matrix.target }}.tar.gz ../../../
          cd ../../..
          sha256sum gitreg-${{ matrix.target }}.tar.gz \
            > gitreg-${{ matrix.target }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target\${{ matrix.target }}\release\gitreg.exe" `
            -DestinationPath "gitreg-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "gitreg-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  gitreg-${{ matrix.target }}.zip" `
            | Out-File -Encoding utf8 "gitreg-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitreg-${{ matrix.target }}
          path: |
            gitreg-${{ matrix.target }}.${{ matrix.archive }}
            gitreg-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish:
    name: Publish release
    needs: [bump, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish release
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5  # v1.14.0
        with:
          tag: ${{ needs.bump.outputs.new_tag }}
          name: ${{ needs.bump.outputs.new_tag }}
          prerelease: false
          makeLatest: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: "dist/**"
