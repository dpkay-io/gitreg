name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5        # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8   # stable 2026-05-01
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32       # v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install musl tools (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf gitreg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gitreg
          mv gitreg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../
          cd ../../..
          sha256sum gitreg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > gitreg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target\${{ matrix.target }}\release\gitreg.exe" `
            -DestinationPath "gitreg-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "gitreg-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  gitreg-${{ github.ref_name }}-${{ matrix.target }}.zip" `
            | Out-File -Encoding utf8 "gitreg-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Upload
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            gitreg-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
            gitreg-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}.sha256
